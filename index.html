<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike Bodell Dot Com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <h2 class="brand">Mike Bodell Dot Com</h2>
        </div>
        <div class="nav-right">
            <a href="#work" class="nav-link">Work</a>
            <a href="#about" class="nav-link">About</a>
            <a href="pages/contact.html" class="nav-link">Contact</a>
        </div>
    </header>
    
    <div class="carousel" id="work">
        <div class="carousel-slides">
            <div class="carousel-slide active">
                <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?w=800&h=400&fit=crop" alt="Mobile App Design">
                <div class="carousel-caption">Mobile App Design</div>
            </div>
            <div class="carousel-slide">
                <img src="https://images.unsplash.com/photo-1586717791821-3f44a563fa4c?w=800&h=400&fit=crop" alt="User Research & Testing">
                <div class="carousel-caption">User Research & Testing</div>
            </div>
            <div class="carousel-slide">
                <img src="https://images.unsplash.com/photo-1558655146-9f40138edfeb?w=800&h=400&fit=crop" alt="Web Design Systems">
                <div class="carousel-caption">Web Design Systems</div>
            </div>
            <div class="carousel-slide">
                <img src="https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?w=800&h=400&fit=crop" alt="Interaction Design">
                <div class="carousel-caption">Interaction Design</div>
            </div>
        </div>
        <div class="carousel-dots">
            <span class="dot active" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
    </div>
    
    <div class="weather-widget">
        <div class="weather-content">
            <div class="weather-header">
                <svg class="weather-icon" id="weather-icon" width="80" height="80" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3">
                    <!-- Default sun icon -->
                    <circle cx="50" cy="50" r="20"/>
                    <line x1="50" y1="10" x2="50" y2="20"/>
                    <line x1="50" y1="80" x2="50" y2="90"/>
                    <line x1="10" y1="50" x2="20" y2="50"/>
                    <line x1="80" y1="50" x2="90" y2="50"/>
                    <line x1="20" y1="20" x2="28" y2="28"/>
                    <line x1="72" y1="72" x2="80" y2="80"/>
                    <line x1="20" y1="80" x2="28" y2="72"/>
                    <line x1="72" y1="28" x2="80" y2="20"/>
                </svg>
                <div class="weather-temp-large" id="temperature">--°</div>
            </div>
            <div class="weather-location" id="location">Loading location...</div>
            <div class="weather-description" id="description">--</div>
            <div class="weather-extra">
                <div class="weather-stat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
                    </svg>
                    <span id="feels-like">Feels like --°</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container" id="about">
        <h1 class="intro">Experience Designer</h1>
        <div class="profile-photo">
            <img src="media/Headshot.png" alt="Michael Bodell, a professional headshot portrait taken on June 18, 2025 at 3:52 PM, showing confident and approachable demeanor against a neutral background">
        </div>
        <a href="pages/contact.html" class="contact-btn">Contact Me</a>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
